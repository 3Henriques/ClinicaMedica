name: Criar Issues

on:
  workflow_dispatch:

permissions:
  issues: write
  repository-projects: write
  contents: read

jobs:
  criar-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Setup inicial de issues do projeto
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const numeroDoProjeto = 1;
            const listaDeIssues = [
              // Estado/Dados
              { title: "[Estado/Dados] Definir model `Cliente` com todos os campos do diagrama de classes", body: "Definir model `Cliente` com todos os campos do diagrama de classes.", labels: ["Estado/Dados"] },
              { title: "[Estado/Dados] Definir model `Consulta` (Atendimento) com todos os campos do diagrama de classes", body: "Definir model `Consulta` (Atendimento) com todos os campos do diagrama de classes.", labels: ["Estado/Dados"] },
              { title: "[Estado/Dados] Definir model `Especialidade` com todos os campos do diagrama de classes", body: "Definir model `Especialidade` com todos os campos do diagrama de classes.", labels: ["Estado/Dados"] },
              { title: "[Estado/Dados] Definir model `DiasAtendimento` com todos os campos do diagrama de classes", body: "Definir model `DiasAtendimento` com todos os campos do diagrama de classes.", labels: ["Estado/Dados"] },
              { title: "[Estado/Dados] Definir enum/constantes para os status de atendimento: L, M, C, X, B", body: "Definir enum/constantes para os status de atendimento: L, M, C, X, B.", labels: ["Estado/Dados"] },
              // Mockup
              { title: "[Mockup] Criar mock de clientes com dados variados (mĂ­nimo 5 registros)", body: "Criar mock de clientes com dados variados (mĂ­nimo 5 registros).", labels: ["Mockup"] },
              { title: "[Mockup] Criar mock de especialidades (mĂ­nimo 4 especialidades)", body: "Criar mock de especialidades (mĂ­nimo 4 especialidades).", labels: ["Mockup"] },
              { title: "[Mockup] Expandir mock de mĂ©dicos com especialidades e dias de atendimento vinculados", body: "Expandir mock de mĂ©dicos com especialidades e dias de atendimento vinculados.", labels: ["Mockup"] },
              { title: "[Mockup] Criar mock de agenda (slots de horĂĄrios por mĂ©dico para 2 meses, com status variados)", body: "Criar mock de agenda (slots de horĂĄrios por mĂ©dico para 2 meses, com status variados).", labels: ["Mockup"] },
              { title: "[Mockup] Criar mock de consultas nos diferentes estados: marcada, confirmada, realizada, encerrada, cancelada", body: "Criar mock de consultas nos diferentes estados: marcada, confirmada, realizada, encerrada, cancelada.", labels: ["Mockup"] },
              { title: "[Mockup] Criar hook `useCliente` para CRUD simulado de clientes", body: "Criar hook `useCliente` para CRUD simulado de clientes.", labels: ["Mockup"] },
              { title: "[Mockup] Criar hook `useConsulta` para CRUD simulado de consultas", body: "Criar hook `useConsulta` para CRUD simulado de consultas.", labels: ["Mockup"] },
              { title: "[Mockup] Criar hook `useEspecialidade` para listagem de especialidades", body: "Criar hook `useEspecialidade` para listagem de especialidades.", labels: ["Mockup"] },
              { title: "[Mockup] Criar hook `useAgenda` para busca de slots de horĂĄrios por mĂ©dico e perĂ­odo", body: "Criar hook `useAgenda` para busca de slots de horĂĄrios por mĂ©dico e perĂ­odo.", labels: ["Mockup"] },
              // Componentes
              { title: "[Componentes] Criar componente `StatusAtendimento` para exibir status de atendimento (L, M, C, X, B) com cores distintas", body: "Criar componente `StatusAtendimento` para exibir status de atendimento (L, M, C, X, B) com cores distintas.", labels: ["Componentes"] },
              { title: "[Componentes] Criar componente `CampoTexto` padronizado para formulĂĄrios, com altura e largura passadas por parĂąmetro da funĂ§ĂŁo", body: "Criar componente `CampoTexto` padronizado para formulĂĄrios, com altura e largura passadas por parĂąmetro da funĂ§ĂŁo.", labels: ["Componentes"] },
              { title: "[Componentes] Criar componente `Lista` reutilizĂĄvel para listagens de clientes e consultas", body: "Criar componente `Lista` reutilizĂĄvel para listagens de clientes e consultas.", labels: ["Componentes"] },
              { title: "[Componentes] Criar componente `ListaConsultas` com horĂĄrios e dias da semana (estendendo `Lista.tsx`)", body: "Criar componente `ListaConsultas` com horĂĄrios e dias da semana (estendendo `Lista.tsx`).", labels: ["Componentes"] },
              { title: "[Componentes] Criar componente `PlanilhaAgenda` para exibir a grade de horĂĄrios com status por dia da semana", body: "Criar componente `PlanilhaAgenda` para exibir a grade de horĂĄrios com status por dia da semana.", labels: ["Componentes"] },
              { title: "[Componentes] Criar componente `SelecionarPeriodo` para selecionar o periodo de abrangencia da \"ListaHorario\" (Figura 2)", body: "Criar componente `SelecionarPeriodo` para selecionar o periodo de abrangencia da \"ListaHorario\" (Figura 2).", labels: ["Componentes"] },
              { title: "[Componentes] Criar componente `Combo` que receba como parametro uma lista do que vai ser mostrado", body: "Criar componente `Combo` que receba como parametro uma lista do que vai ser mostrado.", labels: ["Componentes"] },
              { title: "[Componentes] Criar componente `CardConsulta` para exibiĂ§ĂŁo resumida na tela de RealizaĂ§ĂŁo de Consulta (Figura 4)", body: "Criar componente `CardConsulta` para exibiĂ§ĂŁo resumida na tela de RealizaĂ§ĂŁo de Consulta (Figura 4).", labels: ["Componentes"] },
              { title: "[Componentes] Criar componente `CardConfirmarConsulta` para exibiĂ§ĂŁo resumida das consultas agendadas em lista e checkbox para confirmaĂ§ĂŁo (Figura 3)", body: "Criar componente `CardConfirmarConsulta` para exibiĂ§ĂŁo resumida das consultas agendadas em lista e checkbox para confirmaĂ§ĂŁo (Figura 3).", labels: ["Componentes"] },
              // NavegaĂ§ĂŁo
              { title: "[NavegaĂ§ĂŁo] Configurar `AppNavigator` com todas as rotas das telas de cliente e consulta", body: "Configurar `AppNavigator` com todas as rotas das telas de cliente e consulta.", labels: ["NavegaĂ§ĂŁo"] },
              { title: "[NavegaĂ§ĂŁo] Implementar navegaĂ§ĂŁo na tela `Home` para os mĂłdulos principais", body: "Implementar navegaĂ§ĂŁo na tela `Home` para os mĂłdulos principais.", labels: ["NavegaĂ§ĂŁo"] },
              { title: "[NavegaĂ§ĂŁo] Implementar fluxo de navegaĂ§ĂŁo em etapas para o processo de `MarcarConsulta`", body: "Implementar fluxo de navegaĂ§ĂŁo em etapas para o processo de `MarcarConsulta`.", labels: ["NavegaĂ§ĂŁo"] },
              { title: "[NavegaĂ§ĂŁo] Implementar fluxo de navegaĂ§ĂŁo em etapas para o processo de `RealizarConsulta`", body: "Implementar fluxo de navegaĂ§ĂŁo em etapas para o processo de `RealizarConsulta`.", labels: ["NavegaĂ§ĂŁo"] },
              { title: "[NavegaĂ§ĂŁo] Implementar redirecionamento pĂłs-login para a tela `Home` ou para a tela \"RealizarConsulta\" (em caso de mĂ©dico)", body: "Implementar redirecionamento pĂłs-login para a tela `Home` ou para a tela \"RealizarConsulta\" (em caso de mĂ©dico).", labels: ["NavegaĂ§ĂŁo"] },
              { title: "[NavegaĂ§ĂŁo] Garantir navegaĂ§ĂŁo de retorno consistente (back) em todas as telas de formulĂĄrio", body: "Garantir navegaĂ§ĂŁo de retorno consistente (back) em todas as telas de formulĂĄrio.", labels: ["NavegaĂ§ĂŁo"] },
              // UI - Login
              { title: "[UI] Implementar tela `Login` com campos de usuĂĄrio e senha e botĂŁo de entrada (mock)", body: "Implementar tela `Login` com campos de usuĂĄrio e senha e botĂŁo de entrada (mock).", labels: ["UI"] },
              // UI - HomeSecretaria
              { title: "[UI] Implementar tela `HomeSecretaria` com menu de acesso aos mĂłdulos: Clientes, MarcaĂ§ĂŁo, ConfirmaĂ§ĂŁo, RealizaĂ§ĂŁo, Encerramento e Cancelamento", body: "Implementar tela `HomeSecretaria` com menu de acesso aos mĂłdulos: Clientes, MarcaĂ§ĂŁo, ConfirmaĂ§ĂŁo, RealizaĂ§ĂŁo, Encerramento e Cancelamento.", labels: ["UI"] },
              { title: "[UI] Implementar dashboard Ă  tela `HomeSecretaria`", body: "Implementar dashboard Ă  tela `HomeSecretaria`.", labels: ["UI"] },
              // UI - HomeMedico
              { title: "[UI] Implementar tela `HomeMedico` com menu de acesso aos mĂłdulos: RealizaĂ§ĂŁo e Cancelamento", body: "Implementar tela `HomeMedico` com menu de acesso aos mĂłdulos: RealizaĂ§ĂŁo e Cancelamento.", labels: ["UI"] },
              { title: "[UI] Implementar dashboard Ă  tela `HomeMedico`", body: "Implementar dashboard Ă  tela `HomeMedico`.", labels: ["UI"] },
              // UI - MĂłdulo Cliente
              { title: "[UI] Implementar tela `ListarClientes` com busca por nome e listagem dos clientes mockados", body: "Implementar tela `ListarClientes` com busca por nome e listagem dos clientes mockados.", labels: ["UI"] },
              { title: "[UI] Implementar tela `CadastrarCliente` com formulĂĄrio completo (nome, nascimento, telefone, email, endereĂ§o)", body: "Implementar tela `CadastrarCliente` com formulĂĄrio completo (nome, nascimento, telefone, email, endereĂ§o).", labels: ["UI"] },
              { title: "[UI] Implementar fluxo de ediĂ§ĂŁo de cliente a partir da listagem", body: "Implementar fluxo de ediĂ§ĂŁo de cliente a partir da listagem.", labels: ["UI"] },
              // UI - MarcaĂ§ĂŁo de Consulta
              { title: "[UI] Implementar etapa 1 de `MarcarConsulta`: seleĂ§ĂŁo de cliente existente com busca", body: "Implementar etapa 1 de `MarcarConsulta`: seleĂ§ĂŁo de cliente existente com busca.", labels: ["UI"] },
              { title: "[UI] Implementar etapa 2 de `MarcarConsulta`: seleĂ§ĂŁo de mĂ©dico e especialidade", body: "Implementar etapa 2 de `MarcarConsulta`: seleĂ§ĂŁo de mĂ©dico e especialidade.", labels: ["UI"] },
              { title: "[UI] Implementar etapa 3 de `MarcarConsulta`: exibiĂ§ĂŁo da agenda com `AgendaGrid` e status dos slots", body: "Implementar etapa 3 de `MarcarConsulta`: exibiĂ§ĂŁo da agenda com `AgendaGrid` e status dos slots.", labels: ["UI"] },
              { title: "[UI] Implementar etapa 4 de `MarcarConsulta`: confirmaĂ§ĂŁo do horĂĄrio selecionado e registro da marcaĂ§ĂŁo", body: "Implementar etapa 4 de `MarcarConsulta`: confirmaĂ§ĂŁo do horĂĄrio selecionado e registro da marcaĂ§ĂŁo.", labels: ["UI"] },
              // UI - ConfirmaĂ§ĂŁo de Consulta
              { title: "[UI] Implementar tela `ConfirmarConsulta` com listagem das consultas marcadas e nĂŁo confirmadas do dia, ordenadas por horĂĄrio e mĂ©dico", body: "Implementar tela `ConfirmarConsulta` com listagem das consultas marcadas e nĂŁo confirmadas do dia, ordenadas por horĂĄrio e mĂ©dico.", labels: ["UI"] },
              { title: "[UI] Implementar aĂ§ĂŁo de confirmar consulta na tela `ConfirmarConsulta` com atualizaĂ§ĂŁo de status", body: "Implementar aĂ§ĂŁo de confirmar consulta na tela `ConfirmarConsulta` com atualizaĂ§ĂŁo de status.", labels: ["UI"] },
              // UI - RealizaĂ§ĂŁo de Consulta
              { title: "[UI] Implementar tela `RealizarConsulta` com listagem de pacientes confirmados para o mĂ©dico", body: "Implementar tela `RealizarConsulta` com listagem de pacientes confirmados para o mĂ©dico.", labels: ["UI"] },
              { title: "[UI] Implementar formulĂĄrio de realizaĂ§ĂŁo com campos: laudo, receita mĂ©dica e histĂłrico do paciente", body: "Implementar formulĂĄrio de realizaĂ§ĂŁo com campos: laudo, receita mĂ©dica e histĂłrico do paciente.", labels: ["UI"] },
              // UI - Encerramento de Consulta
              { title: "[UI] Implementar tela `EncerrarConsulta` com listagem das consultas realizadas e ainda nĂŁo encerradas", body: "Implementar tela `EncerrarConsulta` com listagem das consultas realizadas e ainda nĂŁo encerradas.", labels: ["UI"] },
              { title: "[UI] Implementar formulĂĄrio de encerramento com campos: valor pago, tipo de pagamento e procedimentos realizados", body: "Implementar formulĂĄrio de encerramento com campos: valor pago, tipo de pagamento e procedimentos realizados.", labels: ["UI"] },
              { title: "[UI] Aplicar regra de negĂłcio: consultas de retorno nĂŁo sĂŁo cobradas (campo de valor desabilitado ou zerado)", body: "Aplicar regra de negĂłcio: consultas de retorno nĂŁo sĂŁo cobradas (campo de valor desabilitado ou zerado).", labels: ["UI"] },
              // UI - Cancelamento de Consulta
              { title: "[UI] Implementar tela `CancelarConsulta` com opĂ§ĂŁo de cancelamento por solicitaĂ§ĂŁo do cliente, mĂ©dico e por nĂŁo comparecimento", body: "Implementar tela `CancelarConsulta` com opĂ§ĂŁo de cancelamento por solicitaĂ§ĂŁo do cliente, mĂ©dico e por nĂŁo comparecimento.", labels: ["UI"] },
              { title: "[UI] Implementar checkbox de motivo de cancelamento obrigatĂłrio antes de confirmar a aĂ§ĂŁo", body: "Implementar checkbox de motivo de cancelamento obrigatĂłrio antes de confirmar a aĂ§ĂŁo.", labels: ["UI"] },
              // Ajustes Visuais
              { title: "[Ajustes visuais] Implementar sistema de tokens de cor e tipografia em `TemaEscuro.tsx`", body: "Implementar sistema de tokens de cor e tipografia em `TemaEscuro.tsx`.", labels: ["Ajustes visuais"] },
              { title: "[Ajustes visuais] Aplicar tema escuro de forma consistente em todas as telas", body: "Aplicar tema escuro de forma consistente em todas as telas.", labels: ["Ajustes visuais"] },
              { title: "[Ajustes visuais] Garantir responsividade e legibilidade em diferentes tamanhos de tela", body: "Garantir responsividade e legibilidade em diferentes tamanhos de tela.", labels: ["Ajustes visuais"] },
              // IntegraĂ§ĂŁo futura
              { title: "[IntegraĂ§ĂŁo futura] Tipar todos os modelos com interfaces TypeScript compatĂ­veis com a estrutura do Firestore", body: "Tipar todos os modelos com interfaces TypeScript compatĂ­veis com a estrutura do Firestore.", labels: ["IntegraĂ§ĂŁo futura"] },
            ];
            
            const coresDasLabels = {
              "Estado/Dados": "e4e669",
              "Mockup": "d93f0b",
              "Componentes": "0075ca",
              "NavegaĂ§ĂŁo": "008672",
              "UI": "e99695",
              "Ajustes visuais": "c5def5",
              "IntegraĂ§ĂŁo futura": "bfd4f2"
            };
            
            for (const [label, cor] of Object.entries(coresDasLabels)) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: cor
                });
                console.log(`Label ${label} criada`);
              } catch (e) {
                if (e.status === 422) {
                  console.log(`Label "${label}" jĂĄ existe.`);
                } else {
                  console.log(`Erro ao criar "${label}": ${e.message}`);
                }
              }
            }
            
            const issuesExistentes = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });

            const titulosExistentes = new Set(issuesExistentes.map(i => i.title));
            
            const numerosDasIssuesCriadas = [];
            for (const issue of listaDeIssues) {
              if (titulosExistentes.has(issue.title)) {
                console.log(`Issue "${issue.title}" jĂĄ existe`);
                continue;
              }
              try {
                const issueCriada = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issue.title,
                  body: issue.body,
                  labels: issue.labels
                });
                console.log(`Issue #${issueCriada.data.number} criada: ${issue.title}`);
                numerosDasIssuesCriadas.push({
                  number: issueCriada.data.number,
                  node_id: issueCriada.data.node_id
                });
              } catch (e) {
                console.log(`Erro ao criar a issue "${issue.title}": ${e.message}`);
              }
            }
            
            
            if (numerosDasIssuesCriadas.length > 0) {
              console.log(`\nAdicionando ${numerosDasIssuesCriadas.length} issues no projeto #${numeroDoProjeto}...`);
              try {
                const queryProjeto = await github.graphql(`
                  query($owner: String!, $number: Int!) {
                    organization(login: $owner) {
                      projectV2(number: $number) {
                        id
                      }
                    }
                  }
                `, { owner: context.repo.owner, number: numeroDoProjeto });
                
                const projetoId = queryProjeto.organization?.projectV2?.id;
                
                if (projetoId) {
                  for (const { number: numeroDaIssue, node_id: issueId } of numerosDasIssuesCriadas) {
                    try {
                      await github.graphql(`
                        mutation($projectId: ID!, $contentId: ID!) {
                          addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                            item { id }
                          }
                        }
                      `, { projectId: projetoId, contentId: issueId });
                      console.log(`Issue #${numeroDaIssue} adicionada ao projeto.`);
                    } catch (e) {
                      console.log(`Erro ao adicionar a issue #${numeroDaIssue} ao projeto: ${e.message}`);
                    }
                  }
                } else {
                  console.log(`Projeto #${numeroDoProjeto} nĂŁo encontrado ou nĂŁo acessĂ­vel.`);
                }
              } catch (e) {
                console.log(`Erro ao acessar o projeto ${numeroDoProjeto}: ${e.message}`);
              }
            }